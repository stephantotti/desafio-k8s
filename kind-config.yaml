kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: bookinfo-challenge
nodes:
  - role: control-plane
    # kindest/node:v1.35.0 é o default do kind v0.31.0 e está dentro da faixa
    # suportada pelo Istio 1.30 (k8s 1.32-1.36). Ver docs/arquitetura.md.
    image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
    extraPortMappings:
      # Substitui o LoadBalancer que o kind não tem nativamente
      # istio-ingressgateway será exposto como NodePort nessas mesmas portas.
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 30443
        hostPort: 443
        protocol: TCP