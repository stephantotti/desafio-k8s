apiVersion: v1
kind: ConfigMap
metadata:
  name: bookinfo-custom-dashboards
  namespace: monitoring
  labels:
    app: grafana
data:
  bookinfo-ingress-and-service.json: |
    {
      "title": "Bookinfo - Ingress e Servicos (Custom)",
      "uid": "bookinfo-custom-ingress-service",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "timezone": "utc",
      "panels": [
        {
          "id": 1,
          "title": "Ingress Gateway (Escopo 1/3)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "title": "Requests/s",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", source_workload=\"istio-ingressgateway\", source_workload_namespace=\"istio-system\"}[$__rate_interval]))",
              "legendFormat": "Requests/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Bytes/s (enviados + recebidos)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(istio_request_bytes_sum{reporter=\"source\", source_workload=\"istio-ingressgateway\", source_workload_namespace=\"istio-system\"}[$__rate_interval])) + sum(rate(istio_response_bytes_sum{reporter=\"source\", source_workload=\"istio-ingressgateway\", source_workload_namespace=\"istio-system\"}[$__rate_interval]))",
              "legendFormat": "Bytes/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Packets/s (recebidos + enviados)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "pps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(container_network_receive_packets_total{namespace=\"istio-system\", pod=~\"istio-ingressgateway.*\"}[$__rate_interval])) + sum(rate(container_network_transmit_packets_total{namespace=\"istio-system\", pod=~\"istio-ingressgateway.*\"}[$__rate_interval]))",
              "legendFormat": "Packets/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Por Servico (Escopo 2/3) - selecionado: $workload",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 9
          }
        },
        {
          "id": 6,
          "title": "Requests/s",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(istio_requests_total{reporter=\"destination\", destination_workload=\"$workload\", destination_workload_namespace=\"bookinfo\"}[$__rate_interval]))",
              "legendFormat": "Requests/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Bytes/s (enviados + recebidos)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(istio_request_bytes_sum{reporter=\"destination\", destination_workload=\"$workload\", destination_workload_namespace=\"bookinfo\"}[$__rate_interval])) + sum(rate(istio_response_bytes_sum{reporter=\"destination\", destination_workload=\"$workload\", destination_workload_namespace=\"bookinfo\"}[$__rate_interval]))",
              "legendFormat": "Bytes/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Packets/s (recebidos + enviados)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "pps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(container_network_receive_packets_total{namespace=\"bookinfo\", pod=~\"$workload.*\"}[$__rate_interval])) + sum(rate(container_network_transmit_packets_total{namespace=\"bookinfo\", pod=~\"$workload.*\"}[$__rate_interval]))",
              "legendFormat": "Packets/s",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "hide": 0,
            "refresh": 1
          },
          {
            "name": "workload",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "query": {
              "query": "label_values(istio_requests_total{reporter=\"destination\", destination_workload_namespace=\"bookinfo\"}, destination_workload)",
              "refId": "workload"
            },
            "refresh": 2,
            "sort": 1,
            "current": {}
          }
        ]
      }
    }