##################################################################################################
# Define os "subsets" (versões) de cada serviço do Bookinfo, usados pelas
# VirtualServices para rotear tráfego para uma versão específica (ex:
# reviews subset v1/v2/v3). Sem este arquivo, o Istio não sabe diferenciar
# as 3 versões do reviews-v1/v2/v3 — todas seriam tratadas como um único
# destino (load balancing round-robin entre as 3), sem controle possível.
##################################################################################################
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: productpage
spec:
  host: productpage
  subsets:
  - name: v1
    labels:
      version: v1
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: reviews
spec:
  host: reviews
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2
  - name: v3
    labels:
      version: v3
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: ratings
spec:
  host: ratings
  subsets:
  - name: v1
    labels:
      version: v1
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: details
spec:
  host: details
  subsets:
  - name: v1
    labels:
      version: v1
---