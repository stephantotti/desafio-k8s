# Rota de acesso "padrão" ao Bookinfo — usa o productpage ORIGINAL/compartilhado
# (não as variantes do Escopo 1/3, que têm REVIEWS_HOSTNAME fixo). É aqui que
# o roteamento por header end-user (Escopo 2/3) precisa ser testado, já que
# só o productpage original chama o Service "reviews" (com os 3 subsets via
# DestinationRule) — as variantes ignoram esse mecanismo completamente.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: bookinfo-default
  namespace: bookinfo
spec:
  hosts:
  - "bookinfo.local"
  gateways:
  - bookinfo-gateway
  http:
  - match:
    - uri:
        exact: /productpage
    - uri:
        exact: /login
    - uri:
        exact: /logout
    - uri:
        prefix: /static
    - uri:
        prefix: /api/v1/products
    route:
    - destination:
        host: productpage
        port:
          number: 9080